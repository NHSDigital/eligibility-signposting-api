version: "3.8"
services:
  localstack:
    image: localstack/localstack
    container_name: localstack
    ports:
      - "4566:4566"  # Main API Gateway
      - "4571-4599:4571-4599"  # Service-specific ports (optional range)
    environment:
      - SERVICES=s3,dynamodb,lambda,apigateway,iam
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DEFAULT_REGION=eu-west-1
    volumes:
      - "./localstack_data:/var/lib/localstack"  # Persist data in a local volume
      - ./dist:/tmp/dist
      - /var/run/docker.sock:/var/run/docker.sock # Critical Docker socket mount
